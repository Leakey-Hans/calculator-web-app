<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./script.js" defer></script>
</head>
<body>
    <div class="calculator-container">
        <div class="display-screen">1 + 1</div>
        <div class="btn-container">
            <button class="clear-button">C</button>
            <button class="operator">%</button>
            <button class="operator">del</button>
            <button class="operator">÷</button>
        </div>
        <div class="btn-container">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">x</button>
        </div>
        <div class="btn-container">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>
        </div>
        <div class="btn-container">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>
        </div>
        <div class="btn-container">
            <button>0</button>
            <button>.</button>
            <button class="equal-button">=</button>
        </div>
        <div class="copyright">
            &copy;<a href="https://github.com/Leakey-Hans"> Leakey Hans <img id="logo" src="./github-white-icon.png" alt="github icon"></a>
        </div>
    </div>
</body>
</html>
